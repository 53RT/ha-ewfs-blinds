# blind_tx_template.yaml – Warema EWFS RF transmitter buttons
#
# Creates 5 button entities per blind:
#   - Up/Down:      long press (20 repeats) – full cover travel
#   - Stop:         short burst (4 repeats) – stop command
#   - Tilt Up/Down: short press (4 repeats) – single tilt step
#
# Parameters:
#   blind_name: Human-readable name (e.g. "EG Kitchen")
#   code_up:    Normalized raw timing list for UP command
#   code_down:  Normalized raw timing list for DOWN command
#   code_stop:  Normalized raw timing list for STOP command

button:
  - platform: template
    name: "${blind_name} Up"
    icon: mdi:arrow-collapse-up
    on_press:
      - remote_transmitter.transmit_raw:
          code: ${code_up}
          repeat:
            times: 12
            wait_time: 5ms

  - platform: template
    name: "${blind_name} Down"
    icon: mdi:arrow-collapse-down
    on_press:
      - remote_transmitter.transmit_raw:
          code: ${code_down}
          repeat:
            times: 12
            wait_time: 5ms

  - platform: template
    name: "${blind_name} Stop"
    icon: mdi:stop
    on_press:
      - remote_transmitter.transmit_raw:
          code: ${code_stop}
          repeat:
            times: 4
            wait_time: 5ms

  - platform: template
    name: "${blind_name} Tilt Up"
    icon: mdi:arrow-top-right
    on_press:
      - remote_transmitter.transmit_raw:
          code: ${code_up}
          repeat:
            times: 4
            wait_time: 5ms

  - platform: template
    name: "${blind_name} Tilt Down"
    icon: mdi:arrow-bottom-right
    on_press:
      - remote_transmitter.transmit_raw:
          code: ${code_down}
          repeat:
            times: 4
            wait_time: 5ms
