# blind_rx_template.yaml – Warema EWFS RF receiver sensors
#
# Creates 3 internal binary sensors per blind that detect RF commands from
# the original Warema remote. Each received frame increments a counter;
# the burst-debounce logic in the main config consolidates them into a
# single event with shutter name, command type, and press duration.
#
# Parameters:
#   blind_name: Machine-readable ID (e.g. "warema_eg_kitchen") – used for
#               sensor IDs and as the shutter identifier in events
#   code_up:    Normalized raw timing list for UP command
#   code_down:  Normalized raw timing list for DOWN command
#   code_stop:  Normalized raw timing list for STOP command

binary_sensor:
  - platform: remote_receiver
    name: "${blind_name} RX Up"
    id: rx_${blind_name}_up
    internal: true
    raw:
      code: ${code_up}
    filters:
      - delayed_off: 100ms
    on_press:
      then:
        - lambda: |-
            id(rf_rx_last_millis) = millis();
            if (id(rf_rx_shutter) != "${blind_name}" || id(rf_rx_command) != "up") {
              // New command sequence
              id(rf_rx_count) = 0;
              id(rf_rx_shutter) = "${blind_name}";
              id(rf_rx_command) = "up";
            }
            id(rf_rx_count) += 1;
            id(rf_rx_active) = true;
            id(rf_rx_last_millis) = millis();

  - platform: remote_receiver
    name: "${blind_name} RX Down"
    id: rx_${blind_name}_down
    internal: true
    raw:
      code: ${code_down}
    filters:
      - delayed_off: 100ms
    on_press:
      then:
        - lambda: |-
            id(rf_rx_last_millis) = millis();
            if (id(rf_rx_shutter) != "${blind_name}" || id(rf_rx_command) != "down") {
              id(rf_rx_count) = 0;
              id(rf_rx_shutter) = "${blind_name}";
              id(rf_rx_command) = "down";
            }
            id(rf_rx_count) += 1;
            id(rf_rx_active) = true;
            id(rf_rx_last_millis) = millis();

  - platform: remote_receiver
    name: "${blind_name} RX Stop"
    id: rx_${blind_name}_stop
    internal: true
    raw:
      code: ${code_stop}
    filters:
      - delayed_off: 100ms
    on_press:
      then:
        - lambda: |-
            id(rf_rx_last_millis) = millis();
            if (id(rf_rx_shutter) != "${blind_name}" || id(rf_rx_command) != "stop") {
              id(rf_rx_count) = 0;
              id(rf_rx_shutter) = "${blind_name}";
              id(rf_rx_command) = "stop";
            }
            id(rf_rx_count) += 1;
            id(rf_rx_active) = true;
            id(rf_rx_last_millis) = millis();
